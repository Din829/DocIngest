# DocIngest Default Configuration
# Override per-project by placing a docingest.yaml in your project root
# Priority: default.yaml < project docingest.yaml < CLI args

# =============================================================================
# AI Models (multi-provider with fallback)
# =============================================================================
models:
  vision:
    primary:
      provider: "google"
      model: "gemini-3-flash-preview"
      api_key_env: "GEMINI_API_KEY"
    fallback:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

  chunking_assist:
    primary:
      provider: "google"
      model: "gemini-3-flash-preview"
      api_key_env: "GEMINI_API_KEY"
    fallback:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

  contextual_summary:  # Only used when enrichment.contextual_summary = true
    primary:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

# =============================================================================
# Phase 1: Document Parsing
# =============================================================================
parsing:
  engine: "docling"           # docling | docling_with_fallback

  # OCR settings (auto-triggered for scanned documents)
  ocr:
    engine: "auto"            # auto | easyocr | tesseract | rapidocr
    languages: ["eng", "jpn", "chi_sim"]
    force: false              # true: force OCR even on text-layer PDFs

  # Language detection
  language_detection: "auto"  # auto | fixed value ("ja", "en", "zh", etc.)
  # auto: detect via character distribution (no AI, fast)

  # Vision (per-page AI enrichment)
  # Every page is sent to Vision AI with Docling text as context.
  # The AI decides what to do (no code-level thresholds or filtering).
  vision:
    enabled: true             # true | false — master switch

  # PDF-specific
  pdf:
    table_extraction: true
    image_extraction: true
    max_pages: null           # null = no limit

  # PPT-specific
  pptx:
    include_notes: true       # include speaker notes

  # Word-specific
  # Docling extracts text + table structure from DOCX, but does NOT render page
  # images, so embedded diagrams, screenshots, and figures are lost. Rendering
  # the document via LibreOffice → PDF → screenshots lets Vision AI describe them.
  docx:
    vision_page_images: true    # LibreOffice → PDF → page screenshots → Vision
    max_page_images: 20         # cap pages sent to Vision (excess → text-only + warning)
    max_image_pixels: 4000000   # auto-downscale oversized page images

  # Excel-specific
  xlsx:
    row_to_text: true         # convert rows to natural language sentences
    max_rows: 10000
    include_formulas: false

    # Excel denoising (applied to ALL xlsx/xls, not just 仕様書)
    # Data-heavy spreadsheets pass through with minimal change;
    # layout-heavy ones get significant noise removed.
    denoising:
      enabled: true
      dedup_cells: true           # collapse identical consecutive cells in a row
      strip_empty_cells: true     # remove empty cells from table rows
      extract_metadata_rows: 5    # first N rows: try to pull key-value pairs into metadata
      extract_images: true        # pull embedded images from xlsx zip (xl/media/)
      ensure_page_images: true    # LibreOffice → PDF → page screenshots when Docling has none
      max_page_images: 10         # cap page screenshots sent to Vision (excess → text-only, with warning)
      max_image_pixels: 4000000   # single image pixel cap (≈2000x2000). Larger images are scaled down.

# =============================================================================
# Phase 2: Output Structure
# =============================================================================
output:
  dir: "./knowledge"
  sources_dir: "sources"
  assets_dir: "assets"
  index_file: "index.json"

  markdown:
    include_metadata_header: true  # YAML frontmatter in each file
    image_refs: "relative"         # relative | absolute | inline_base64
    max_file_size_mb: 10           # split very large documents

# =============================================================================
# Phase 3: Chunking
# =============================================================================
chunking:
  enabled: true
  strategy: "auto"            # auto | heading | recursive | slide | sheet | whole | agentic

  max_tokens: 512
  min_tokens: 100
  overlap_tokens: 50

  heading:
    levels: [1, 2, 3]
    fallback: "recursive"

  auto:
    min_headings: 3
    max_heading_gap_levels: 2
    prefer_heading_threshold: 2   # structure score >= 2 → heading strategy

    # Format-specific strategy mapping (override per format)
    format_strategies:
      pptx: "slide"
      xlsx: "sheet"
      csv: "sheet"
      image: "whole"
      default: "scoring"          # all others → structure scoring

    # Extensions treated as "image" format
    image_formats: ["png", "jpg", "jpeg", "tiff", "bmp", "webp", "gif"]

  # Protection rules (applied across all strategies)
  protection:
    tables: true              # don't split Markdown tables
    code_blocks: true         # don't split ``` blocks
    lists: true               # keep lists together when possible
    quotes: true              # keep > blocks together
    allowed_overflow: 2.0     # protected blocks may exceed max_tokens × 2.0

  ai_assist:
    enabled: true
    trigger: "oversized"      # oversized | anomaly | always | never
    oversized_multiplier: 2   # chunk > max_tokens * 2 triggers AI

  enrichment:
    path_injection: true      # prepend file path + heading path (free, always do)
    contextual_summary: false # LLM summary per chunk (expensive, opt-in)

  output_file: "chunks.jsonl"

# =============================================================================
# Performance
# =============================================================================
performance:
  parallel_files: 4           # file-level parallelism
  # Vision parallelism is set in parsing.vision.parallel_calls

# =============================================================================
# Error Handling
# =============================================================================
error_handling:
  on_parse_failure: "skip"    # skip | retry | fail
  on_vision_failure: "skip"   # chart description fails → skip (text preserved)
  on_chunk_failure: "fallback" # chunk fails → fallback to recursive
  max_retries: 2
  report_file: "errors.json"

# =============================================================================
# Cache (AI call result caching — Vision/LLM responses by content hash)
# =============================================================================
cache:
  enabled: true
  dir: ".docingest_cache"

# =============================================================================
# Incremental processing (content-addressed pipeline output cache)
# =============================================================================
# Skips re-processing files whose content hasn't changed since last run.
# Cache key = md5(head + tail bytes) + file_size (content-based, NOT path-based).
# Invalidates automatically when:
#   - File content changes
#   - Output config changes (relevant subset only)
#   - Output files (sources/, assets/) are manually deleted
#   - chunk_ids are missing from chunks.jsonl
# Cache stored at: {output.dir}/{incremental.cache_dir}/*.meta.json
incremental:
  enabled: true                   # master toggle
  force: false                    # true → ignore cache, full rebuild
  cache_dir: ".cache"             # relative to output.dir

# =============================================================================
# Refine (optional: AI-powered Markdown cleanup for human readability)
# =============================================================================
# NOT part of the main pipeline — invoked separately via `docingest refine`.
# Produces readable/ versions of sources/ files without modifying originals.
refine:
  output_dir: "readable"          # output subdirectory inside knowledge/
  model: "chunking_assist"        # reuse models.chunking_assist config
  max_input_tokens: 8000          # skip files larger than this (with warning)
  max_output_tokens: 8000         # LLM response cap
  default_skill: "refine_default" # SKILL file name (without .SKILL.md)
  skills_dir: "skills"            # directory containing .SKILL.md files

# =============================================================================
# Knowledge Map (search guide for Agents)
# =============================================================================
knowledge_map:
  enabled: true
  ai_summary: true              # true: AI generates summary + search guide (1 API call)
                                # false: Stage 1 only (zero cost, structure + keywords only)
  output_file: "knowledge_map.yaml"
  # Key = sha256(model_id + file_content_hash + relevant_config_hash)
