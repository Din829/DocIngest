# DocIngest Default Configuration
# Override per-project by placing a docingest.yaml in your project root
# Priority: default.yaml < project docingest.yaml < CLI args

# =============================================================================
# AI Models (multi-provider with fallback)
# =============================================================================
models:
  # Fallback defaults for every LLM task (vision / chunking_assist / refine / ...).
  # Any task that does not explicitly set max_response_tokens inherits this.
  # Set explicitly because litellm injects max_tokens=4096 by default for both
  # Gemini and Claude when omitted (https://github.com/BerriAI/litellm/issues/8835).
  defaults:
    # Output budget for every LLM call. Set to 65536 (Gemini 3 Flash /
    # 3.1 Pro hard ceiling per https://ai.google.dev/gemini-api/docs/models).
    # Gemini's per-request default is only 8192 if maxOutputTokens is omitted,
    # so we must set this explicitly to unlock the full 64K. GPT-5.4-mini
    # supports 128K but the fallback chain is capped by the smaller side.
    max_response_tokens: 65536
    # Retry once when the LLM stops with finish_reason="length" (response cut
    # off by the token limit). Retry doubles the budget up to retry_max_tokens.
    retry_on_truncation: true
    retry_max_tokens: 65536
    # Network-level retry count passed to litellm (rate limits, 5xx, TCP
    # resets). Orthogonal to retry_on_truncation above — both can fire for
    # the same call. Set to 0 to disable; litellm's own default is 0, but
    # production workloads benefit from at least 2 retries with exponential
    # backoff to survive transient Gemini/OpenAI hiccups.
    max_retries: 2

  vision:
    # Per-task override; falls through to models.defaults.max_response_tokens
    # when unset. Kept explicit at the provider ceiling (65536 = Gemini 3 Flash
    # / 3.1 Pro hard limit) so dense PDF / multi-page sheet / 方眼紙 仕様書
    # Vision calls never hit silent finish_reason="length" truncation.
    max_response_tokens: 65536
    # Wall-clock cap per Vision call (single page). null = no timeout.
    # Catches hung API calls so as_completed() doesn't wait forever.
    # Independent of litellm's network-level retry — this bounds the
    # whole call (incl. retries) at the application layer.
    timeout_sec: 180
    primary:
      provider: "google"
      model: "gemini-3-flash-preview"
      api_key_env: "GEMINI_API_KEY"
    fallback:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

  chunking_assist:
    primary:
      provider: "google"
      model: "gemini-3-flash-preview"
      api_key_env: "GEMINI_API_KEY"
    fallback:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

  contextual_summary:  # Only used when enrichment.contextual_summary = true
    primary:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"

  # Audio transcription (ASR) — used by MediaParser for audio/video files
  # when no subtitle file is available. Same primary/fallback chain as Vision.
  audio_transcription:
    primary:
      provider: "dashscope"               # Qwen3-ASR (default, recommended)
      model: "qwen3-asr-flash"            # base64 multimodal API, fast, no upload needed
      api_key_env: "DASHSCOPE_API_KEY"
    fallback:
      provider: "openai"                  # Whisper (broad language support)
      model: "whisper-1"
      api_key_env: "OPENAI_API_KEY"

# =============================================================================
# Phase 1: Document Parsing
# =============================================================================
parsing:
  engine: "docling"           # docling | docling_with_fallback

  # Wall-clock cap for a single file's parse step. null = no timeout.
  # A hung Docling call (rare but possible on malformed PDFs) is caught
  # here so the rest of the pipeline keeps moving. The file is recorded
  # as failed with error_type="timeout".
  timeout_sec: 300

  # Generic Markdown post-processing — applied to all non-xlsx formats
  # (PDF / DOCX / PPTX / HTML / plain Markdown). The xlsx path has its own
  # richer denoising under parsing.xlsx.denoising.
  markdown:
    # Collapse merged-cell duplication inside Markdown table rows.
    # Docling expands a single cell that spans N columns into N identical
    # cells, turning one piece of content into N× the tokens. The collapse
    # is safety-gated inside the implementation: only applied when it
    # removes ≥50% of cells in a row (strong signal of merge noise, not a
    # legitimate data table with coincidental duplicates).
    dedup_table_rows: true

  # OCR settings (auto-triggered for scanned documents)
  ocr:
    engine: "auto"            # auto | easyocr | tesseract | rapidocr
    languages: ["eng", "jpn", "chi_sim"]
    force: false              # true: force OCR even on text-layer PDFs

    # Pre-downloaded RapidOCR model paths. When set, all three must be set
    # together — DocIngest will pass them directly to docling's
    # RapidOcrOptions(det_model_path=..., cls_model_path=..., rec_model_path=...).
    # This bypasses RapidOCR's default site-packages download location, which
    # fails on non-root containers (docling issue #2500). Setting these also
    # FORCES engine="rapidocr" — otherwise docling's auto-pick might land on
    # EasyOCR/Tesseract and ignore the paths silently.
    #
    # Download the models once in your Dockerfile with:
    #   rapidocr download_models --config /app/rapidocr.yaml
    # then point each path here at the resulting .onnx file.
    #
    # Default null = use RapidOCR's built-in download location (fine for
    # local dev / root containers; broken for non-root prod containers).
    rapidocr_model_paths:
      det: null               # e.g. "/app/models/rapidocr/ch_PP-OCRv4_det_mobile.onnx"
      cls: null               # e.g. "/app/models/rapidocr/ch_ppocr_mobile_v2.0_cls_mobile.onnx"
      rec: null               # e.g. "/app/models/rapidocr/ch_PP-OCRv4_rec_mobile.onnx"

  # Language detection
  language_detection: "auto"  # auto | fixed value ("ja", "en", "zh", etc.)
  # auto: detect via character distribution (no AI, fast)

  # Vision (per-page AI enrichment)
  # Every page is sent to Vision AI with Docling text as context.
  # The AI decides what to do (no code-level thresholds or filtering).
  vision:
    enabled: true             # true | false — master switch
    max_pages: null           # Global cap on Vision API calls per file. null
                              # (default) defers to the `safety:` section for
                              # cost control — safety.mode=warn/strict runs a
                              # pre-flight budget check and prompts the user
                              # BEFORE any LLM call. A hard cap here would just
                              # silently truncate (159-page xlsx → drop pages
                              # 51-159 with no signal to the caller), which is
                              # information loss disguised as defence. Set an
                              # int here only if a specific workload needs a
                              # tighter cap independent of safety budget.
    image_dpi: 180            # resolution for page images sent to Vision.
                              # 72 = fastest/smallest (readable for large text only)
                              # 150 = good balance (main elements clear, small labels fuzzy)
                              # 180 = recommended default (both main + small labels clear)
                              # 200+ = diminishing returns, risks 4MP cap downscale
                              # Gemini charges per-image regardless of DPI,
                              # OpenAI/Claude charge by tile/pixel count.
    triage:
      enabled: true             # true = skip pages that are purely text (saves API cost)
                                # false = all pages sent to Vision (maximum quality, higher cost)
      min_text_length: 50       # Pages with less text than this → always send to Vision
      max_replacement_ratio: 0.05  # U+FFFD ratio above this → always send to Vision
      table_line_threshold: 30  # Markdown table rows above this → send to Vision.
                                # Raised from the earlier 10 after real-world
                                # 仕様書 / API spec / Q&A 表 testing: nearly
                                # every page in those docs has 10+ rows of
                                # routine tables that Docling handles fine,
                                # so the old threshold of 10 sent ~100% of
                                # pages to Vision unnecessarily. 30 still
                                # catches the giant merged-cell tables where
                                # Vision actually helps verify structure.
      max_mixed_script_fragments: 8  # Mixed-script anomaly count above this
                                    # → send to Vision. Detects CJK mismap
                                    # garbling (e.g. する→寸, 査→查) via
                                    # short ASCII (1-3 chars) directly
                                    # adjacent to CJK characters.
                                    # Raised from the earlier 3 after real
                                    # Japanese technical-spec testing:
                                    # legitimate jargon like "プロトコルHTTP1.1",
                                    # "方式client_secret_jwt", "TLS1.2以上"
                                    # routinely produces 3–6 fragments per
                                    # page. 8 keeps the OCR-garbling signal
                                    # (real cases produce 10+ per page) while
                                    # no longer flagging clean tech prose.

      # Language-script consistency check — the strongest signal for CMap
      # failures that produce CLEAN but WRONG Unicode (e.g. Docling yielding
      # Bengali/Thai/Tibetan characters on a Japanese-declared document).
      # The other garble checks miss this case: legal Unicode, no glyph<,
      # no U+FFFD, no CJK mismap sandwich — just the wrong script entirely.
      #
      # For each configured language, list the Unicode scripts that are
      # legitimately allowed. Anything outside the whitelist counts toward
      # the unexpected ratio. "Common" (digits, punctuation, whitespace,
      # CJK punctuation, fullwidth forms) is always allowed automatically.
      #
      # Add a new language = add a line here. No code changes needed.
      language_script_check:
        enabled: true
        max_unexpected_script_ratio: 0.05   # >5% unexpected characters → send to Vision
        min_text_length_for_check: 50       # skip very short pages (random noise risk)
        expected_scripts:
          ja: [Latin, Han, Hiragana, Katakana]
          zh: [Latin, Han, Hiragana, Katakana]   # Chinese docs sometimes embed kana
          en: [Latin]
          ko: [Latin, Hangul, Han]

    # Batched multi-image Vision call — for xlsx whose single sheet renders
    # to multiple PDF pages (long 方眼紙 / cross-page tables). Independent
    # experiments (see notes in pipeline._enrich_with_vision) showed that
    # sending all 11 pages of one sheet in a single Gemini Vision call beats
    # per-page calls 90% vs 18% on substring coverage and 10/10 vs 1/10 on
    # cross-page continuity — because Vision can stitch table continuations
    # across page boundaries when it sees them together. Only triggered for
    # xlsx/xls; other formats keep per-page calls (where the assumption
    # breaks down — PDF pages are usually independent).
    batched_call:
      enabled: true                  # false → always per-page (rollback switch)
      min_pages_per_sheet: 1.5       # trigger when pages/sheet ≥ this. DB-spec
                                     # xlsx (13 sheet → 16 page = 1.2) stays
                                     # per-page; USDM-style (4 sheet → 18 page
                                     # = 4.5) triggers batched.
      max_images_per_batch: 20       # API hard cap. Larger batches fall back
                                     # to per-page rather than risk one mega-
                                     # call hitting model context limits.

  # PDF-specific
  pdf:
    table_extraction: true
    image_extraction: true
    max_pages: null           # null = no limit
    hidden_text_detection:
      enabled: true           # Detect hidden/invisible elements via Docling ContentLayer

    # Optional per-format Vision override. Any field listed here overrides the
    # global models.vision.* / parsing.vision.* setting for THIS format only.
    # Supported keys: model, max_response_tokens, image_dpi.
    # Unset fields fall through to the global config.
    vision:
      # max_response_tokens: 32768
      # image_dpi: 200
      # model: { provider: "google", model: "gemini-3-pro-preview" }

  # PPT-specific
  # Docling extracts text from PPT but image generation depends on the backend
  # pipeline. When page images are missing, render via LibreOffice → PDF →
  # screenshots so Vision AI can describe slide visuals.
  pptx:
    include_notes: true         # include speaker notes
    vision_page_images: true    # LibreOffice → PDF → page screenshots → Vision
    max_page_images: 30         # PPT can have many slides — cap for cost control
    max_image_pixels: 4000000   # auto-downscale oversized page images

    # Chart data direct-read.
    # Reads chart category / series / values straight from the pptx object
    # model (python-pptx) and injects them as Markdown tables into the
    # corresponding slide section, BEFORE Vision runs. This guarantees
    # 100% accurate chart numbers even when the rendered slide image is
    # blurry or the chart type defeats Vision OCR. Unsupported chart
    # types (Waterfall / Treemap / Sunburst etc.) silently fall through
    # to the existing Vision-only path.
    extract_chart_data: true

    # Optional per-format Vision override. See parsing.pdf.vision for usage.
    vision:
      # max_response_tokens: 8192     # PPT 文字大、内容稀，可省 tokens
      # image_dpi: 150                # 截图低分辨率即可
      # model: { provider: ..., model: ... }

  # Word-specific
  # Docling extracts text + table structure from DOCX, but does NOT render page
  # images, so embedded diagrams, screenshots, and figures are lost. Rendering
  # the document via LibreOffice → PDF → screenshots lets Vision AI describe them.
  docx:
    vision_page_images: true    # LibreOffice → PDF → page screenshots → Vision
    max_page_images: 20         # cap pages sent to Vision (excess → text-only + warning)
    max_image_pixels: 4000000   # auto-downscale oversized page images

    # Math equations (OMML) → LaTeX preprocessing.
    # DOCX math is stored in Office Math Markup Language (m:oMath elements)
    # inside word/document.xml. Docling does NOT convert these to LaTeX —
    # equations are lost or garbled in the exported Markdown. When this
    # option is enabled, a pre-parse hook rewrites the DOCX in memory,
    # replacing every oMath element with a text run holding the LaTeX
    # equivalent ($E=mc^2$ style), before Docling sees the file. Documents
    # with zero equations incur zero cost (the hook returns None and the
    # original file is parsed directly).
    omml_to_latex: true

    # Optional per-format Vision override. See parsing.pdf.vision for usage.
    vision:
      # max_response_tokens: 32768
      # image_dpi: 200
      # model: { provider: ..., model: ... }

  # ZIP archive expansion
  # Users often hand DocIngest a .zip full of mixed documents. When this
  # is enabled, zips are unpacked into a dedicated cache subdirectory and
  # their contents take the zip's place in the file list. Office Open XML
  # files (docx / pptx / xlsx) are technically zips but are NOT expanded —
  # they're handled by their native parsers.
  zip:
    enabled: true
    # Persistent extract directory (relative to output.dir/.cache). Kept
    # across runs so the second run hits the content-addressed cache
    # on the extracted files directly.
    extract_dir: "_zip_extract"
    # ZIP bomb / resource exhaustion defences. Any single limit tripping
    # refuses the whole archive — the original zip stays in the file
    # list and Docling surfaces the error.
    max_nesting_depth: 3              # max recursion for nested zips
    max_total_extract_size_mb: 500    # total uncompressed size cap
    max_file_count: 10000             # total entry count cap
    # Filename encoding fallback chain. Windows zip tools frequently
    # write CJK names with broken UTF-8 flags; this chain recovers the
    # real name. CP437 is deliberately NOT in this list — it's what
    # Python's zipfile defaulted to, and it's what we're trying to
    # escape. If you add cp437 here it will be auto-skipped.
    filename_encodings:
      - utf-8
      - cp932
      - shift_jis
      - euc-jp

  # Content-based format detection (magika, optional)
  # magika is Google's ML model that identifies file types from content.
  # DocIngest uses it as a fallback for weak extensions (bin, dat, tmp,
  # no extension at all) — the most common case is files extracted from
  # zip archives that lost their extensions. Strong extensions like .pdf
  # or .docx are trusted by default.
  # Install: pip install magika
  magika:
    enabled: true                 # only effective when `magika` is installed
    # Extensions that should trigger content-based override unconditionally.
    # The empty string "" matches files with no extension at all
    # (Dockerfile, README, etc.).
    weak_extensions:
      - ""
      - bin
      - dat
      - tmp
      - out
      - raw
      - dump
    # Set true to let magika override even strong extensions (.pdf, .docx
    # etc.). Conservative default is false — a mismatch between content
    # and a strong extension is more often a legitimate edge case than an
    # error, and Docling handles most mismatches internally anyway.
    correct_strong_extensions: false

  # Audio / video transcription
  # MediaParser handles these formats. Strategy: subtitle-first (look for
  # .srt/.vtt next to the file — 100% accurate, zero API cost), then ASR
  # fallback via models.audio_transcription.
  audio:
    formats:                               # audio extensions to accept
      - mp3
      - wav
      - m4a
      - flac
      - aac
      - ogg
      - wma
      - opus
    video_formats:                         # video extensions (audio extracted via ffmpeg)
      - mp4
      - avi
      - mkv
      - webm
      - mov
      - wmv
      - flv
      - ts
      - m4v
    prefer_subtitles: true                 # look for .srt/.vtt before calling ASR
    language: "auto"                       # "auto" = let ASR detect; or "ja", "en", "zh", ...
    context: ""                            # hotwords / domain terms for better ASR accuracy
    include_timestamps: true               # emit [MM:SS] markers in transcript Markdown
    max_segment_seconds: 150               # long audio split threshold (ffmpeg)
                                           # Qwen3-ASR-Flash has ~3min per-call limit,
                                           # 150s (2.5min) is the safe default
                                           # (same as qwen_asr.py's DEFAULT_SEGMENT_DURATION)

  # URL resolution (yt-dlp)
  # When users pass an http/https URL as input, DocIngest downloads the
  # media + subtitles + metadata via yt-dlp (supports 1000+ sites).
  url:
    enabled: true
    download_dir: "_media"                 # relative to output.dir/.cache/
    yt_dlp_extra_args: []                  # additional yt-dlp flags (advanced)

  # Legacy .xls (BIFF) — converted to .xlsx via LibreOffice before the
  # rest of the pipeline sees the file. Once converted it goes through
  # the full xlsx path (openpyxl renderer + Vision + chunking) with the
  # original .xls filename / mimetype / binary_hash preserved in
  # metadata.lineage.original_input. LibreOffice missing → degrades to
  # TextParser fallback (gibberish, but pipeline never raises).
  xls:
    auto_convert_to_xlsx: true

  # Excel-specific
  xlsx:
    row_to_text: true         # convert rows to natural language sentences
    max_rows: 10000
    include_formulas: false

    # AutoShape connector relationship extraction.
    # LibreOffice's xlsx → PDF rendering sometimes drops the terminal point
    # of arrow connectors (xdr:cxnSp), making画面遷移図 / フロー図 visually
    # incomplete on the screenshot Vision sees. This hook reads the OOXML
    # drawing XML directly, reconstructs source-box → target-box pairs by
    # geometric proximity, and feeds the list to Vision as ground-truth
    # structured data — same channel as PPTX chart direct-read. Vision then
    # trusts the relationship list for arrow direction and focuses on
    # labels / annotations / phase groupings that the list cannot convey.
    #
    # No effect on xlsx without drawings or without connectors. Failure
    # modes (encrypted xlsx / unreadable XML / no edges within proximity
    # threshold) silently skip via HookNoOp without polluting lineage.
    extract_connector_data: true

    # Render xlsx directly via openpyxl instead of routing through Docling.
    # Why this is the default: Docling's Excel backend renders all sheets
    # into one flat markdown stream and *misaligns* sheet headings against
    # their bodies — content from sheet N can end up under sheet N-1's
    # `## name` heading. That contaminates chunk metadata (title_path
    # points at the wrong sheet) and silently breaks per-sheet retrieval.
    # openpyxl reads cells directly so every sheet's body is guaranteed
    # to live under its own heading. Merged cells stay as anchor-only
    # (no Docling-style cell duplication), columns that are entirely
    # empty across the sheet are pruned, and the existing
    # parsing.xlsx.denoising / vision / ensure_page_images logic still
    # applies on top.
    # Falls back to Docling automatically if openpyxl is not installed
    # or the workbook refuses to open. Flip to false to force the legacy
    # Docling path (e.g. for A/B testing or if your xlsx hits an openpyxl
    # bug — please file an issue when this happens).
    use_openpyxl_renderer: true

    # Excel denoising (applied to ALL xlsx/xls, not just 仕様書)
    # Data-heavy spreadsheets pass through with minimal change;
    # layout-heavy ones get significant noise removed.
    denoising:
      enabled: true
      dedup_cells: true           # collapse identical consecutive cells in a row
      strip_empty_cells: true     # remove empty cells from table rows
      extract_metadata_rows: 5    # first N rows: try to pull key-value pairs into metadata
      extract_images: true        # pull embedded images from xlsx zip (xl/media/)
      ensure_page_images: true    # LibreOffice → PDF → page screenshots when Docling has none
      max_page_images: null       # no per-format cap; defers to parsing.vision.max_pages (default 50).
                                  # Earlier 10 was overly defensive — single-sheet 方眼紙 / DB design
                                  # / process-flow xlsx routinely renders to 20-160 PDF pages via
                                  # LibreOffice, and the global parsing.vision.max_pages already
                                  # acts as the cost ceiling. Set an int here only if a specific
                                  # xlsx workload needs a tighter local cap.
      max_image_pixels: 4000000   # single image pixel cap (≈2000x2000). Larger images are scaled down.

    # Optional per-format Vision override. See parsing.pdf.vision for usage.
    vision:
      # max_response_tokens: 32768
      # image_dpi: 200
      # model: { provider: ..., model: ... }

# =============================================================================
# Phase 2: Output Structure
# =============================================================================
output:
  dir: "./knowledge"
  sources_dir: "sources"
  assets_dir: "assets"
  index_file: "index.json"
  include_bounding_boxes: true  # Extract per-element coordinates from Docling

  # Docling+Vision dedup — DEFAULT OFF.
  #
  # When Vision enrichment runs on a page, the pipeline produces two views of
  # that page: Docling's text/table extraction AND Vision's image-based
  # description. Old default behaviour was "if Vision looks long enough, keep
  # only Vision and drop Docling" — that assumes Vision is a faithful superset
  # of Docling. In practice that assumption only holds reliably for single-
  # page-per-section formats (text PDF, PPTX). For xlsx / docx / mixed
  # workloads the two views describe different things (e.g. Docling sees
  # sheet body text, Vision sees the rendered page area) and a length-ratio
  # check cannot tell whether real content overlaps. The wrong side then
  # silently overwrites the right side and there is no warning.
  #
  # Default keeps BOTH views — markdown is slightly larger but no content is
  # ever lost. Downstream consumers (RAG / Agentic Search / grep) match on
  # whichever channel happens to have the answer, raising recall without
  # changing the API shape. Re-enable only when you have evidence that on
  # YOUR corpus Vision is a faithful superset of Docling (e.g. clean text
  # PDFs) and you want to shrink the markdown.
  dedup:
    enabled: false              # false = keep both (default, safe)
                                # true  = drop Docling when Vision passes the
                                #         ratio + absolute-floor gates below
    vision_ratio_threshold: 0.7 # Only consulted when enabled=true.
                                # Vision len >= this × Docling len → may drop Docling.
    vision_min_chars: 200       # Only consulted when enabled=true.
                                # Absolute floor: Vision must also be >= this many
                                # chars before dropping Docling. Guards the failure
                                # mode where a tiny Vision blob proportionally
                                # matches a denoised Docling block and wipes real
                                # content. Set to 0 to rely on ratio alone.

  markdown:
    include_metadata_header: true  # YAML frontmatter in each file
    image_refs: "relative"         # relative | absolute | inline_base64
    max_file_size_mb: 10           # split very large documents

    # Frontmatter field whitelist + order. Fields appear in the generated
    # frontmatter only if (a) they're in this list AND (b) the hook / parser
    # actually wrote them to parse_result.metadata. Unknown fields in metadata
    # are NOT auto-exported — this protects frontmatter from leaking internal
    # state. Hooks that need a new field should add its name here AND write
    # the value to parse_result.metadata.
    frontmatter_fields:
      # Core identity
      - format
      - title
      - language
      - pages
      # Docling origin (promoted by file_metadata hook)
      - mimetype
      - binary_hash
      # Exiftool enrichment (populated when metadata.exiftool.enabled)
      - author
      - created_at
      # Derived metadata — see output.derived_metadata below.
      # Always-on (best-effort): created falls back to filesystem mtime
      # when no embedded date is available; aliases / tags are produced
      # from in-memory data already in metadata. Each one is an
      # independent toggle under output.derived_metadata.* if a deployment
      # wants to opt out.
      - created
      - created_source
      - aliases
      - tags

  # Derived metadata — fields synthesised from data already extracted by
  # parsers / hooks. Independent of any external tool. Disabling these
  # only suppresses the field; the underlying source data is unaffected.
  derived_metadata:
    created:
      enabled: true               # write `created` + `created_source`
                                  # (false → leave both absent)
    aliases:
      enabled: true
      max_count: 5                # cap on emitted aliases per file
      # Garbage candidates — match (case-insensitive) and the candidate
      # is dropped entirely. Used for boilerplate titles like "Untitled"
      # or "Microsoft Word - Document1" that pollute search.
      garbage_patterns:
        - "^untitled\\d*$"
        - "^document\\d*$"
        - "^microsoft word - "
        - "^slide\\d+$"
        - "^\\s*$"
        # 64-char hex — sha256 / md5 used as internal cache filenames
        # (e.g. pipeline.py Phase 0.5 .xls→.xlsx cache stem). Real file
        # names never look like this; suppresses cache-stem leakage into
        # aliases when downstream hooks read file_path.stem.
        - "^[0-9a-f]{64}$"
      # Temp filename markers — match → candidate is DEMOTED (kept only
      # when it would otherwise leave the alias list empty / undersized).
      # These are version markers and copy artefacts that real documents
      # may have, so we don't drop them outright.
      temp_filename_patterns:
        - "\\bv\\d+\\b"
        - "\\bfinal\\b"
        - "_copy$"
        - "\\(\\d+\\)$"
        - "^tmp[_\\-]"
        - "副本"
        - "复件"
    tags:
      enabled: true
      include_format: true        # add format/<f> tag (e.g. format/pdf)
      include_language: true      # add lang/<l> tag (e.g. lang/ja)
      # Stage 2: after the knowledge_map is built, append kw/<word> tags
      # using the corpus-wide TF-IDF filtered keyword index. Set false
      # to keep tags as just format/lang.
      enrich_from_knowledge_map: true
      max_keyword_tags: 5         # per-file cap on kw/<word> additions

# =============================================================================
# Phase 3: Chunking
# =============================================================================
chunking:
  enabled: true
  strategy: "auto"            # auto | heading | recursive | slide | sheet | whole | agentic

  max_tokens: 512
  min_tokens: 100
  # Token overlap between consecutive chunks produced by RecursiveChunker.
  # NOTE — overlap applies ONLY inside RecursiveChunker (i.e. when a heading
  # section exceeds max_tokens and recursive is invoked to sub-divide it).
  # HeadingChunker's section boundaries, SlideChunker's slide boundaries,
  # SheetChunker's table boundaries, and TimestampChunker's time segments
  # are treated as hard semantic breaks — they do NOT receive overlap.
  # TableSplitter achieves the same goal differently (header repetition).
  # Keep the default at 50 (conservative, matches LangChain / Chonkie
  # defaults). 2026 benchmarks (Vecta, SPLADE+Mistral-8B on NQ) report
  # overlap contributes <1% recall for recursive strategies — most users
  # can safely set this to 0 to shrink chunks.jsonl by ~10%.
  overlap_tokens: 50

  heading:
    levels: [1, 2, 3]
    fallback: "recursive"
    merge_small_sections: true  # Merge adjacent sections below min_tokens into one chunk
                                # false = every heading boundary is a hard chunk boundary (legacy)

    # How to handle content that appears BEFORE the first heading in a
    # document (e.g. page-header stray text Docling extracts from PDFs).
    #   attach_to_first — glue it to the first real section (default, avoids
    #                     tiny orphan chunks like "西暦" at chunk[0])
    #   standalone      — emit as its own chunk with empty title_path
    #   drop            — discard silently (useful for aggressive denoising)
    prelude_policy: "attach_to_first"

    # How to handle a heading line with no body (e.g. "## Chapter 2" with the
    # next line being another heading or empty).
    #   merge_forward — attach the heading to the NEXT section that has body
    #                   content, preserving its deepest title_path (default)
    #   keep          — emit the lone heading as its own chunk (legacy)
    orphan_heading_policy: "merge_forward"

    # Which title_path to keep when multiple sections merge into one chunk.
    #   deepest   — the most-granular path (most " > " segments) wins (default)
    #   first     — the first non-empty title_path
    #   join_all  — all paths joined by " | " (legacy behaviour)
    title_path_strategy: "deepest"

  auto:
    min_headings: 3
    max_heading_gap_levels: 2
    prefer_heading_threshold: 2   # structure score >= 2 → heading strategy

    # Format-specific strategy mapping (override per format)
    format_strategies:
      pptx: "slide"
      xlsx: "sheet"
      csv: "sheet"
      image: "whole"
      audio: "timestamp"
      video: "timestamp"
      default: "scoring"          # all others → structure scoring

    # Extensions treated as "image" format
    image_formats: ["png", "jpg", "jpeg", "tiff", "bmp", "webp", "gif"]

    # Extensions treated as "audio" / "video" format (for auto strategy)
    audio_formats: ["mp3", "wav", "m4a", "flac", "aac", "ogg", "wma", "opus"]
    video_formats: ["mp4", "avi", "mkv", "webm", "mov", "wmv", "flv", "ts", "m4v"]

  # Protection rules (applied across all strategies)
  protection:
    tables: true              # don't split Markdown tables
    code_blocks: true         # don't split ``` blocks
    lists: true               # keep lists together when possible
    quotes: true              # keep > blocks together
    # How much protected blocks may exceed max_tokens.
    # Single number = uniform for all types (legacy).
    # Dict = per-type control (table, list, code_block, quote, default).
    allowed_overflow:
      table: 2.0              # tables are hard to split — allow more
      code_block: 3.0         # code blocks should stay intact
      list: 1.5               # lists can be split at item boundaries if too large
      quote: 1.5
      default: 1.5            # fallback for any unspecified type

    # What to do when a protected block EXCEEDS its allowed_overflow budget.
    # Per-block-type so different content kinds get the right trade-off.
    #   bypass          — emit the oversized block as a single chunk (legacy).
    #                     OK for code (splitting mid-function breaks syntax).
    #   row_split       — tables only: split at data-row boundaries, repeat
    #                     header in every sub-chunk (2026 industry standard,
    #                     see Chonkie TableChunker / Ragie table chunking).
    #                     Fixes Docling's merged-cell expansion producing
    #                     multi-kilo-token tables.
    #   warn_and_bypass — same as bypass + logs a warning so oversized blocks
    #                     stay discoverable for tuning.
    on_overflow:
      table: "row_split"
      code_block: "bypass"
      list: "bypass"
      quote: "bypass"
      default: "bypass"

    # Parameters for row_split (consulted only when on_overflow = row_split).
    table_split:
      keep_header_in_every_chunk: true   # every sub-chunk is self-describing
      max_rows_per_chunk: null           # null = only token budget applies;
                                         # set an integer to cap row count
                                         # (useful for DB-dump-style tables)

  ai_assist:
    enabled: true
    trigger: "oversized"      # oversized | anomaly | always | never
    oversized_multiplier: 2   # chunk > max_tokens * 2 triggers AI

  enrichment:
    path_injection: true      # prepend file path + heading path (free, always do)
    contextual_summary: false # LLM summary per chunk (expensive, opt-in)

  output_file: "chunks.jsonl"

# =============================================================================
# Performance
# =============================================================================
performance:
  parallel_files: 4           # Worker count shared by Vision per-page calls
                              # and ASR per-segment transcription.
                              # NOTE: file-level parallelism is not yet
                              # implemented — the pipeline processes files
                              # sequentially; this key only controls the
                              # inner ThreadPoolExecutor pools.

# =============================================================================
# Error Handling
# =============================================================================
error_handling:
  on_parse_failure: "skip"    # skip | fail
  on_vision_failure: "skip"   # chart description fails → skip (text preserved)
  on_chunk_failure: "fallback" # chunk fails → fallback to recursive
  max_retries: 2
  report_file: "errors.json"

# =============================================================================
# External binaries
# =============================================================================
# Explicit paths for external command-line tools DocIngest can use when
# present (LibreOffice for office→PDF rendering, ExifTool for metadata,
# ffmpeg for audio preprocessing). Leave as null to auto-discover via the
# binary finder, which probes (in order):
#
#   1. this config key (highest priority; misconfigured paths fail loud)
#   2. dedicated env vars (SOFFICE_PATH / EXIFTOOL_PATH / FFMPEG_PATH)
#   3. shutil.which() — PATH lookup
#   4. platform-specific standard install locations (Program Files on
#      Windows, /Applications on macOS, /usr/bin on Linux, …)
#
# Only set these when auto-discovery fails (unusual install drive,
# portable copies, multi-version systems).
binaries:
  soffice:
    path: null           # LibreOffice — e.g. "D:/tools/libreoffice/soffice.exe"
  exiftool:
    path: null           # ExifTool — e.g. "C:/Program Files/exiftool/exiftool.exe"
  ffmpeg:
    path: null           # ffmpeg — reserved for future audio parser

# =============================================================================
# Cache (AI call result caching — Vision/LLM responses by content hash)
# =============================================================================
cache:
  enabled: true
  dir: ".docingest_cache"

# =============================================================================
# File metadata enrichment (file_metadata hook)
# =============================================================================
# Two data sources surface into parse_result.metadata and then into the
# sources/*.md frontmatter:
#
#   1. Docling origin (always on, zero cost):
#      mimetype + binary_hash are lifted from Docling's DoclingDocument.origin
#      into top-level frontmatter keys. This is pure promotion — no external
#      tools, no extra I/O.
#
#   2. ExifTool (opt-in, requires system-level exiftool executable):
#      Reads PDF Author / CreateDate, image EXIF (GPS, camera, keywords),
#      audio ID3 tags, etc. Fields that Docling does NOT expose. Requires:
#        - `exiftool` >= 12.24 (CVE-2021-22204 fix) on PATH, OR
#          metadata.exiftool.path pointing at an explicit location
#        - optionally `pyexiftool` Python package for stay_open mode
#          (pip install pyexiftool) — falls back to subprocess otherwise
#      When exiftool is unavailable, the hook silently skips this part
#      and frontmatter simply lacks the exiftool-derived fields.
metadata:
  exiftool:
    enabled: false                # opt-in: flip to true when exiftool is installed
    path: null                    # null = auto-discover via shutil.which
    # Per-format field whitelists (merged with Exiftool canonical names).
    # Fields outside this list are dropped from the nested `exif:` frontmatter
    # block to keep output focused. Family is picked by file extension:
    #   image: png/jpg/jpeg/gif/tiff/bmp/webp/heic
    #   pdf:   pdf
    #   audio: wav/mp3/m4a/flac/ogg/aac
    #   office: docx/doc/pptx/ppt/xlsx/xls
    fields:
      image: [ImageSize, Title, Caption, Description, Keywords,
              Artist, Author, DateTimeOriginal, CreateDate, GPSPosition]
      pdf:   [Title, Author, Subject, Keywords, CreateDate, ModifyDate,
              Producer, Creator]
      audio: [Title, Artist, Album, Genre, Track, DateTimeOriginal,
              CreateDate, Duration]
      office: [Title, Author, Subject, Keywords, Company, CreateDate,
               ModifyDate, LastModifiedBy]

# =============================================================================
# Quality report (Vision uncertainty marker scan)
# =============================================================================
# Scans sources/*.md for [?] (partial reads) and [unreadable] markers that
# the Vision prompt uses when it cannot fully transcribe content. Provides
# a quick health check and identifies files that need manual review or
# higher DPI re-processing.
quality_report:
  enabled: true                       # scan after pipeline completes
  output_file: "quality_report.json"  # full report path (relative to output.dir)

# =============================================================================
# Run log (append-only pipeline timeline)
# =============================================================================
# Unlike errors.json / quality_report.json (per-run snapshots overwritten on
# each run), log.md is the knowledge base's TIMELINE across runs — one section
# appended per `docingest run` invocation, recording what was added, updated,
# or failed, and when.
#
# The log is grep-friendly: every section header starts with
# "## [<ISO timestamp>] run ...", so e.g.
#   grep "^## \[" log.md | tail -5
# yields the last five runs regardless of body length.
#
# Cached files stay silent in the body (only counted in the summary) so a
# 100-file knowledge base with 1 new file produces 1 body line, not 100.
# No-change runs still write a header so "did the pipeline run on <date>?"
# is answerable from the log alone.
#
# Toggling enabled does NOT invalidate the content cache — run_log is
# metadata about runs, not about file contents.
run_log:
  enabled: true           # master toggle
  output_file: "log.md"   # relative to output.dir

# =============================================================================
# Safety — pre-run budget check (Phase 0)
# =============================================================================
# Runs BEFORE any parsing / LLM call. Flags files and per-run totals that
# exceed configured thresholds and surfaces a structured violation report.
#
# Why not just file size (MB)?
#   Disk size is a poor proxy for cost. A 100 MB PPTX with 20 slides is
#   cheaper than a 5 MB PDF with 200 dense pages. Real cost drivers are:
#     pages          → Vision API calls (PDF pages, PPTX slides)
#     chars_est      → output markdown / token bulk (sampled for PDF)
#     rows           → xlsx processing time
#     duration_sec   → ASR cost (audio / video)
#     est_cost_usd   → rough dollar estimate based on Vision model price
#     size_mb        → last-resort guard for formats we can't introspect
#
# Modes:
#   off    — skip Phase 0 entirely (legacy behaviour).
#   warn   — (default) log violations but run anyway.
#   strict — refuse to run; caller must raise a threshold or pass
#            --yes (CLI) / acknowledge_large=true (Python API / MCP).
#
# MCP agents receive safety.violations in the run result, so they can
# inspect them and retry with acknowledge_large=true. This mirrors MCP's
# own elicitation/create pattern (confirm-on-expensive).
#
# Defaults below are tuned for small projects (the "对半" baseline —
# roughly half of the industry-standard defaults like Anthropic's
# 100-page vision cutoff). Raise them freely for larger workloads.
safety:
  enabled: true
  mode: "warn"                  # off | warn | strict

  # Per-file thresholds. A single file exceeding ANY of these is flagged.
  # Set a field to null to disable that specific dimension.
  per_file:
    max_pages: 50               # PDF pages / PPTX slides / DOCX est-pages
    max_chars_est: 250000       # Estimated text length (sampled for PDF)
    max_rows: 20000             # xlsx / csv total rows
    max_duration_sec: 900       # 15 min — audio / video
    max_size_mb: 25             # Disk-size fallback
    max_est_cost_usd: 1.0       # Dollar budget per file

  # Per-run thresholds — protect against "many small files adding up".
  per_run:
    max_total_pages: 200
    max_total_files: 50
    max_total_est_cost_usd: 5.0

  # Text-length estimation tuning for PDF.
  # PyMuPDF's get_text() is fast but full scan of a 1000-page PDF still
  # costs ~10 s. Sampling N pages and extrapolating keeps inspect <100 ms.
  # Set enabled: false to force exact counts (slower, more precise).
  sampling:
    enabled: true
    pdf_sample_pages: 3

  # Rough per-call Vision price table in USD. Used to compute est_cost_usd.
  # Not a live feed — update after provider pricing changes. Unknown
  # models fall back to "_default". Prefix match works too, so
  # "gemini-3-flash-preview" hits the "gemini-3-flash" entry.
  vision_price_per_call:
    gemini-3-flash-preview: 0.0002
    gemini-3-flash: 0.0002
    gemini-3-pro-preview: 0.002
    gemini-3-pro: 0.002
    gpt-5.4-mini: 0.005
    gpt-4o: 0.008
    gpt-4o-mini: 0.002
    claude-sonnet: 0.006
    _default: 0.005

# =============================================================================
# Incremental processing (content-addressed pipeline output cache)
# =============================================================================
# Skips re-processing files whose content hasn't changed since last run.
# Cache key = md5(head + tail bytes) + file_size (content-based, NOT path-based).
# Invalidates automatically when:
#   - File content changes
#   - Output config changes (relevant subset only)
#   - Output files (sources/, assets/) are manually deleted
#   - chunk_ids are missing from chunks.jsonl
# Cache stored at: {output.dir}/{incremental.cache_dir}/*.meta.json
incremental:
  enabled: true                   # master toggle
  force: false                    # true → ignore cache, full rebuild
  cache_dir: ".cache"             # relative to output.dir

# =============================================================================
# Refine (optional: AI-powered Markdown cleanup for human readability)
# =============================================================================
# NOT part of the main pipeline — invoked separately via `docingest refine`.
# Produces readable/ versions of sources/ files without modifying originals.
refine:
  output_dir: "readable"          # output subdirectory inside knowledge/
  model: "chunking_assist"        # reuse models.chunking_assist config
  max_input_tokens: 50000         # skip files larger than this (with warning)
  max_output_tokens: 65536        # LLM response cap (raised to provider ceiling —
                                  # 8000 was a 2024 leftover that truncated long
                                  # refines silently; refine.py already retries
                                  # with retry_max_tokens but the first attempt
                                  # should not waste a call on a too-small budget)
  default_skill: "refine_default" # SKILL file name (without .SKILL.md)
  skills_dir: "skills"            # directory containing .SKILL.md files

# =============================================================================
# Knowledge Map (search guide for Agents)
# =============================================================================
knowledge_map:
  enabled: true
  ai_summary: true              # true: AI generates summary + search guide (1 API call)
                                # false: Stage 1 only (zero cost, structure + keywords only)
  # Inject a short two-phase search-protocol block into knowledge_search.SKILL.md
  # (RAG → Agentic Search, synonym expansion, "Grep miss ≠ not written" guard).
  # Language follows the knowledge base's dominant language (ja / zh / en;
  # others fall back to en). The wording is hard-coded — this switch only
  # turns the block on/off. Turn off if you have your own Agent guidance.
  search_protocol: true
  output_file: "knowledge_map.yaml"
  keywords:
    # --- SudachiPy backend (used when `pip install sudachipy sudachidict_core`) ---
    pos_keep: ["名詞"]            # POS major categories to keep (Japanese morphology)
    sudachi_mode: "C"             # A=finest, B=middle, C=coarsest (compound nouns)
    # --- Regex fallback (used when SudachiPy is not installed) ---
    latin_min_len: 3              # Minimum Latin word length (filters "No", "of", etc.)
    cjk_min_len: 3                # Minimum raw CJK run length before strip
    cjk_strip_patterns:           # Regex patterns stripped from CJK run head/tail
      - "^[のはをがにでとも]+"
      - "に関する$"
      - "について$"
      - "における$"
      - "および$"
    cjk_min_after_strip: 2        # Minimum CJK length after stripping
    # --- Common to both backends ---
    extra_stop_words:             # Words to always exclude from keywords
      - "group"                   # Docling internal group name
      - "list"                    # Docling internal group name
      - "slide"                   # Docling internal group name
    max_per_file: 15              # Max keywords per file in knowledge_map
    max_index: 50                 # Max entries in keyword_index reverse map
    # Discrimination filter (TF-IDF document-frequency cut-off): words that
    # appear in more than this fraction of files are treated as stop words
    # and dropped from keyword_index. Words in "too many files" have no
    # cross-file signal regardless of language or domain ("場合" / "事項" in
    # legal docs, "introduction" / "conclusion" in papers).
    # 1.0 disables the filter; the filter is also skipped for very small
    # corpora (< 3 files) where document frequency is not statistical.
    max_doc_frequency_ratio: 0.7
# =============================================================================
# Sensitive Data Sanitization (PII masking)
# =============================================================================
sanitize:
  enabled: false                    # Default OFF — opt-in only (risk of false positives)
  # Rules can be overridden entirely via config. Each rule has:
  #   name: human-readable label
  #   pattern: regex pattern
  #   replacement: replacement string
  # Default rules (high precision only): email, URL, credit card (Luhn),
  # IPv4, Japanese phone numbers. No name detection (impossible with regex).
  # Set rules: [] to disable all defaults and use only your own.
  rules: null                       # null = use built-in defaults

  # Key = sha256(model_id + file_content_hash + relevant_config_hash)

# =============================================================================
# GraphRAG (optional — requires `pip install -e ".[graph]"`)
# =============================================================================
# Builds an entity / relation knowledge graph + (optionally) community
# summaries on top of the chunks.jsonl that the main pipeline produces.
# This is a strictly OPT-IN downstream stage — main `docingest run` never
# touches it, the import path `docingest.graph` only loads when explicitly
# imported, and the produced files live in {output.dir}/{graph.output_subdir}/
# so deleting the directory leaves the rest of the knowledge base intact.
#
# Two retrieval modes (selected per build, baked into the index):
#   vector_only  — entity + relation embeddings only. Cheap. Single / two-hop
#                  questions and "find me content about X" style retrieval.
#                  Skips community detection + community summaries entirely.
#                  (Maps to LightRAG's "naive" + "local" query modes.)
#   full         — adds Leiden community detection + per-community LLM
#                  summaries. Enables global / hybrid / mix queries that
#                  answer "what are the main themes / trends" style
#                  questions. (Maps to LightRAG's full mode set.)
#
# Default OFF. Even when enabled, no work runs until the user invokes
# `docingest graph build` or `docingest.graph.build()` explicitly.
graph:
  # Declarative flag: the user (or automation) telling DocIngest "I do
  # want a graph layer on this knowledge base". It is NOT a gate that
  # prevents graph commands from running — what actually keeps the
  # graph layer dormant is:
  #   (1) [graph] extras not installed → docingest.graph module fails
  #       to import, CLI / MCP simply don't show the `graph` commands;
  #   (2) the main `docingest run` pipeline never touches the graph
  #       subpackage; nothing happens until the user explicitly invokes
  #       `docingest graph build` or `docingest.graph.build()`.
  # Set true if a downstream script keys off this value to decide
  # whether to trigger a build automatically.
  enabled: false                       # informational flag — default OFF
  backend: "lightrag"                  # lightrag (only backend in v1)
  mode: "full"                         # vector_only | full
  output_subdir: "graph"               # relative to output.dir

  # Which chunks feed the graph. Sourced exclusively from chunks.jsonl —
  # graph build NEVER re-parses original documents.
  input:
    chunks_file: "chunks.jsonl"        # relative to output.dir
    # Restrict to specific source formats. null = all formats.
    formats: null                      # e.g. ["pdf", "docx"]
    # Skip chunks shorter than this — page-headers / numbers / boilerplate
    # produce noise during entity extraction.
    min_chunk_tokens: 50

  # LLM for entity / relation extraction + community summaries.
  # Independent from models.vision / models.chunking_assist — graph is a
  # separate task that often wants a cheaper / smaller model. The shape
  # mirrors models.<task> exactly (primary / fallback / max_response_tokens
  # / max_retries) so the same provider.py code paths apply.
  llm:
    primary:
      provider: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"
    fallback:
      provider: "google"
      model: "gemini-3-flash-preview"
      api_key_env: "GEMINI_API_KEY"
    max_response_tokens: 65536         # entity extraction returns structured JSON.
                                       # Raised to provider ceiling — 8K silently
                                       # truncated dense chunks with many entities,
                                       # causing partial graph extraction. Larger
                                       # chunks rarely need >8K but the headroom
                                       # is free until tokens are actually emitted.

  # Embedding model — independent from LLM (different provider OK).
  # Cannot be changed after first build without --force-rebuild: vector
  # dimensions are baked into the index files at creation time.
  embedding:
    provider: "openai"                 # openai | google | sentence_transformers
    model: "text-embedding-3-small"
    api_key_env: "OPENAI_API_KEY"
    dimension: 1536                    # MUST match the chosen model
    max_token_size: 8192               # max input tokens per embedding call
    max_batch_size: 32                 # batch size for ainsert

  # LightRAG-specific knobs. Other backends ignore unknown keys.
  lightrag:
    # LightRAG re-chunks internally — we feed DocIngest chunks as input,
    # but LightRAG may merge adjacent ones up to this size before doing
    # entity extraction. Default 1200 matches LightRAG's own default.
    chunk_token_size: 1200
    chunk_overlap_token_size: 100

    # Extra LLM passes per chunk to recover entities the first pass missed.
    # 0 = no extra pass (DocIngest default); 1 = LightRAG's own default;
    # 2+ rapidly hits diminishing returns at multiplied cost.
    #
    # Why we default to 0 (different from LightRAG's 1):
    #   The typical DocIngest input is a STRUCTURED document — DB design
    #   sheets, API specs, Q&A tables, contracts — where the first
    #   extraction pass already captures ~95%+ of meaningful entities.
    #   Gleaning doubles the LLM call count for a marginal recall bump
    #   that's mostly irrelevant on this shape of input.
    # When to raise back to 1 (or 2):
    #   - Free-flowing prose / academic papers / news articles.
    #   - Domain-specific jargon density that the first pass tends to
    #     miss (medical / legal corpus where edge entities matter).
    #   - You've observed empty / sparse entity counts in graph status
    #     and want a recall safety net.
    entity_extract_max_gleaning: 0

    # Chunks processed in parallel during build. LightRAG's own default
    # is 2 (conservative); 4 is a reasonable middle ground for most
    # OpenAI / Gemini accounts that have left tier-1 limits.
    # Higher values (6-8) need a high LLM tier or you'll hit rate
    # limits; lower values (1-2) protect a shared / low-quota account.
    # Has ZERO effect on extraction precision — pure throughput knob.
    max_parallel_insert: 4

    # LightRAG's own per-prompt LLM result cache (separate from DocIngest's
    # extraction cache below; both layers compose).
    enable_llm_cache: true
    # Output language passed to LightRAG's prompt templates. "auto" reads
    # the dominant language from the knowledge base's index.json language
    # tally; explicit values ("English" / "Chinese" / "Japanese" / ...)
    # bypass detection.
    language: "auto"
    # Community detection knobs (only consulted when graph.mode == "full").
    community:
      algorithm: "leiden"              # leiden (LightRAG's default)
      max_cluster_size: 10
      max_levels: 3                    # depth of community hierarchy

  # Incremental cache — reuses extraction results when chunk content
  # unchanged. Keyed by (chunk_id + content_hash + llm_config_hash). This
  # is independent of incremental.* (which guards the main pipeline) and
  # of LightRAG's own LLM cache (which dedups by exact prompt). All three
  # compose: a chunk that hasn't changed AND has a matching LLM config
  # skips extraction entirely; if extraction does run, identical prompts
  # hit LightRAG's prompt cache.
  cache:
    enabled: true
    cache_dir: ".graph_cache"          # relative to output.dir

  # Chunk enrichment — feed the graph's entity / description back into a
  # NEW jsonl file so traditional RAG (vector search on chunks) also gets
  # to use what GraphRAG extracted. The original chunks.jsonl is NEVER
  # modified — enrichment writes a parallel output_file the user can opt
  # to consume instead. Deleting that file leaves everything else intact.
  #
  # Why bother:
  # - Synonym recall: "修繕費" → matches a chunk where the entity is
  #   "原状回復費用" (their descriptions are now adjacent in the embedding
  #   space).
  # - Anchor signal: in a 1000-token chunk where 30 tokens are about
  #   "敷金", an explicit "[关键实体: 敷金 — 預かり金]" header gives the
  #   embedding model a clearer anchor.
  # - Metadata filtering: vector DBs can do `WHERE entities CONTAINS '敷金'`
  #   when the field is in metadata.
  enrich_chunks:
    enabled: false                     # master toggle — default OFF
    output_file: "chunks_enriched.jsonl"  # written next to chunks.jsonl

    # How many entities to inject per chunk. Picked from those whose graph
    # source_id includes that chunk, sorted by:
    #   1) chunks where the entity is exclusive (only this chunk) — most
    #      "definitional", highest signal
    #   2) shorter entity names (longer names are usually doc-headers /
    #      boilerplate carrying low information density)
    max_entities_per_chunk: 5

    # Per-entity description truncation, characters. The whole point is a
    # short anchor; full LLM-generated descriptions can be 200+ chars and
    # would balloon every chunk uselessly.
    max_description_length: 100

    # Two independent injection channels — disable either to keep the
    # other. Most users want both.
    inject_into_text: true             # adds "[关键实体: ...]" header line
                                       # → benefits pure vector RAG
    inject_into_metadata: true         # adds metadata.entities = [...]
                                       # → benefits metadata filtering / hybrid search

    # Templated so the injected line works in any language. {entities} is
    # the joined entity string; per-entity formatting uses
    # name_desc_separator.
    text_template: "[关键实体: {entities}]"
    entity_separator: "; "             # between consecutive entities
    name_desc_separator: " — "         # between entity name and its description
